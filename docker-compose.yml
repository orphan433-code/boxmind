services:
  postgres:
    image: postgres:16-alpine
    container_name: pet-link-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: petlink
      POSTGRES_PASSWORD: petlink
      POSTGRES_DB: petlink
    ports:
      - "5436:5432"
    volumes:
      - pet_link_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petlink -d petlink"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pet-link-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_POSTGRE_HOST: postgres
      DB_POSTGRE_PORT: "5432"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: pet-link-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  pet_link_pg_data:
  web_node_modules:
